version: "3.9"

# ============================================================
# Preloved Services — Local Infrastructure Stack
# Run with: make dev-infra
# ============================================================

networks:
  preloved_net:
    name: preloved_net
    driver: bridge

volumes:
  preloved_postgres_data:
    name: preloved_postgres_data
  preloved_mongo_data:
    name: preloved_mongo_data
  preloved_redis_data:
    name: preloved_redis_data
  preloved_rabbitmq_data:
    name: preloved_rabbitmq_data
  preloved_elasticsearch_data:
    name: preloved_elasticsearch_data
  preloved_minio_data:
    name: preloved_minio_data

services:

  # ──────────────────────────────────────────────
  # PostgreSQL — Core business data (Active)
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: preloved_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Drew2424}
      POSTGRES_DB: ${POSTGRES_DB:-preloved}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - preloved_postgres_data:/var/lib/postgresql/data
    networks:
      - preloved_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-preloved}"]
      interval: 5s
      timeout: 5s
      retries: 5

